services:
  app:
    build: .
    image: polymarket-stocks-hedging
    container_name: polymarket-stocks-hedging
    network_mode: service:vpn
    depends_on:
      vpn:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ${CONFIG_PATH:-./config}:/app/config:ro
      - ${DATA_PATH:-./data}:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/auth"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  vpn:
    image: dperson/openvpn-client
    container_name: poylmarket-stocks-hedging-vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - ${VPN_PATH:-./vpn}:/vpn
    restart: always
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
